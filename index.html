<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Amaan Alam - Software Engineer</title>
<meta name="description" content="Amaan Alam is a full-stack software engineer building polished web and mobile products with MERN, React Native, and modern backend architecture."/>
<meta name="theme-color" content="#f5efe5"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f5efe5;
  --bg-soft:#fbf8f3;
  --surface:rgba(255,255,255,.84);
  --surface-strong:#ffffff;
  --surface-tint:rgba(243,235,223,.88);
  --ink:#191613;
  --ink-soft:#2f2a25;
  --muted:#6d655d;
  --muted-soft:#8f877f;
  --line:rgba(25,22,19,.10);
  --line-strong:rgba(25,22,19,.16);
  --accent:#0f766e;
  --accent-deep:#115e59;
  --accent-soft:#d9efeb;
  --accent-wash:rgba(15,118,110,.10);
  --warm:#b7791f;
  --warm-soft:#f7e7c7;
  --shadow:0 24px 60px rgba(36,30,24,.08);
  --shadow-lg:0 30px 90px rgba(36,30,24,.12);
  --radius-xl:32px;
  --radius-lg:24px;
  --radius-md:18px;
  --radius-sm:14px;
  --max:1180px;
  --sans:'Manrope',sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --ease:cubic-bezier(.22,1,.36,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{
  min-height:100vh;
  font-family:var(--sans);
  color:var(--ink);
  background:
    radial-gradient(circle at top left, rgba(247,231,199,.9), transparent 28%),
    radial-gradient(circle at 85% 15%, rgba(15,118,110,.12), transparent 26%),
    linear-gradient(180deg, #fcfaf6 0%, var(--bg) 40%, #f2eadf 100%);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
body.menu-open{overflow:hidden}
a{color:inherit;text-decoration:none}
button{font:inherit}
img{max-width:100%;display:block}
::selection{background:rgba(15,118,110,.18)}
::-webkit-scrollbar{width:10px}
::-webkit-scrollbar-track{background:rgba(25,22,19,.04)}
::-webkit-scrollbar-thumb{background:rgba(25,22,19,.18);border-radius:999px}

.page-shell{position:relative;overflow:hidden}
.page-shell::before,
.page-shell::after{
  content:'';
  position:absolute;
  border-radius:999px;
  filter:blur(80px);
  pointer-events:none;
}
.page-shell::before{
  width:280px;
  height:280px;
  background:rgba(15,118,110,.08);
  top:180px;
  right:-60px;
}
.page-shell::after{
  width:340px;
  height:340px;
  background:rgba(183,121,31,.08);
  top:780px;
  left:-80px;
}

.container{width:min(calc(100% - 2.5rem),var(--max));margin:0 auto}
.section{padding:6.5rem 0;position:relative;scroll-margin-top:110px}
.band{
  background:linear-gradient(180deg, rgba(255,255,255,.36), rgba(255,255,255,.54));
  border-block:1px solid rgba(25,22,19,.06);
}

.rv{
  opacity:0;
  transform:translateY(24px);
  transition:opacity .7s var(--ease),transform .7s var(--ease);
}
.rv.vis{
  opacity:1;
  transform:none;
}

.surface-card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px);
}

.eyebrow,
.section-label,
.meta-label,
.tag,
.chip,
.project-number,
.link-inline,
.metric-label,
.footer-note,
.nav-links a,
.mobile-menu a{
  font-family:var(--mono);
}

.site-header{
  position:fixed;
  top:16px;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;
  width:min(calc(100% - 1.5rem),1120px);
  padding:.9rem 1.15rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(255,255,255,.72);
  border:1px solid rgba(25,22,19,.08);
  border-radius:999px;
  box-shadow:0 12px 30px rgba(25,22,19,.08);
  backdrop-filter:blur(20px);
  transition:background .25s ease,border-color .25s ease,box-shadow .25s ease,transform .25s ease;
}
.site-header.scrolled{
  background:rgba(255,255,255,.92);
  border-color:rgba(25,22,19,.12);
  box-shadow:0 18px 36px rgba(25,22,19,.10);
}
.brand{
  display:flex;
  align-items:center;
  gap:.85rem;
  min-width:0;
}
.brand-mark{
  width:42px;
  height:42px;
  border-radius:14px;
  display:grid;
  place-items:center;
  font-weight:800;
  letter-spacing:-.04em;
  color:#fff;
  background:linear-gradient(135deg,var(--accent-deep),var(--accent),#1b9b92);
  box-shadow:0 12px 24px rgba(15,118,110,.20);
}
.brand-copy{min-width:0}
.brand-name{
  display:block;
  font-size:.95rem;
  font-weight:700;
  letter-spacing:-.03em;
}
.brand-role{
  display:block;
  font-size:.67rem;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--muted);
}
.nav-links{
  display:flex;
  align-items:center;
  gap:1.65rem;
  list-style:none;
}
.nav-links a{
  font-size:.73rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--muted);
  position:relative;
  transition:color .2s ease;
}
.nav-links a:hover,
.nav-links a.active{color:var(--ink)}
.nav-links a::after{
  content:'';
  position:absolute;
  left:0;
  bottom:-.55rem;
  width:100%;
  height:2px;
  transform:scaleX(0);
  transform-origin:left;
  background:linear-gradient(90deg,var(--accent),rgba(15,118,110,.1));
  transition:transform .25s ease;
}
.nav-links a:hover::after,
.nav-links a.active::after{transform:scaleX(1)}
.nav-cta{
  display:inline-flex;
  align-items:center;
  gap:.5rem;
  padding:.75rem 1.15rem;
  border-radius:999px;
  background:var(--ink);
  color:#fff;
  font-size:.8rem;
  font-weight:700;
  letter-spacing:-.01em;
  transition:transform .2s ease,box-shadow .2s ease,background .2s ease;
}
.nav-cta:hover{
  transform:translateY(-1px);
  background:#0f0d0b;
  box-shadow:0 14px 30px rgba(25,22,19,.18);
}
.hamburger{
  display:none;
  width:46px;
  height:46px;
  border:none;
  border-radius:50%;
  background:rgba(25,22,19,.05);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:5px;
  cursor:pointer;
}
.hamburger span{
  width:18px;
  height:2px;
  border-radius:999px;
  background:var(--ink);
  transition:transform .22s ease,opacity .22s ease;
}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{
  position:fixed;
  top:82px;
  left:50%;
  transform:translateX(-50%) translateY(-10px);
  width:min(calc(100% - 1.5rem),1120px);
  padding:1rem;
  border-radius:28px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.92);
  box-shadow:var(--shadow-lg);
  backdrop-filter:blur(20px);
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:opacity .25s ease,transform .25s ease,visibility .25s ease;
  z-index:999;
}
.mobile-menu.open{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
  transform:translateX(-50%) translateY(0);
}
.mobile-menu a{
  display:block;
  padding:1rem 1.1rem;
  border-radius:18px;
  font-size:.78rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--muted);
  transition:background .2s ease,color .2s ease;
}
.mobile-menu a:hover,
.mobile-menu a.active{
  background:var(--accent-soft);
  color:var(--accent-deep);
}

.hero{
  padding:8.75rem 0 5.5rem;
  min-height:100svh;
  display:flex;
  align-items:center;
}
.hero-layout{
  display:grid;
  grid-template-columns:minmax(0,1.15fr) minmax(320px,.85fr);
  gap:2rem;
  align-items:stretch;
}
.hero-copy,
.hero-stack{
  position:relative;
  z-index:1;
}
.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:.55rem;
  padding:.55rem .9rem;
  border-radius:999px;
  border:1px solid rgba(15,118,110,.18);
  background:rgba(255,255,255,.56);
  font-size:.7rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--accent-deep);
}
.eyebrow-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 6px rgba(15,118,110,.10);
}
.hero-kicker{
  margin-top:1.35rem;
  font-size:.95rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--muted);
}
.hero-title{
  margin-top:1rem;
  max-width:12ch;
  font-size:clamp(3rem,6vw,5.9rem);
  line-height:.95;
  letter-spacing:-.06em;
  font-weight:800;
}
.hero-title .accent{
  display:block;
  color:var(--accent-deep);
}
.hero-text{
  margin-top:1.5rem;
  max-width:60ch;
  font-size:1.08rem;
  line-height:1.8;
  color:var(--ink-soft);
}
.hero-actions{
  display:flex;
  flex-wrap:wrap;
  gap:.85rem;
  margin-top:2rem;
}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:.55rem;
  min-height:52px;
  padding:0 1.3rem;
  border-radius:999px;
  border:1px solid transparent;
  font-size:.94rem;
  font-weight:700;
  transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease,background .2s ease,color .2s ease;
}
.btn:hover{transform:translateY(-2px)}
.btn-primary{
  background:var(--ink);
  color:#fff;
  box-shadow:0 18px 36px rgba(25,22,19,.16);
}
.btn-primary:hover{box-shadow:0 22px 42px rgba(25,22,19,.20)}
.btn-secondary{
  background:rgba(255,255,255,.62);
  color:var(--ink);
  border-color:var(--line-strong);
}
.btn-secondary:hover{
  background:var(--surface-strong);
  border-color:rgba(15,118,110,.25);
}
.hero-proof{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:1rem;
  margin-top:2.75rem;
}
.proof-item{
  padding:1.15rem 1.1rem;
  border:1px solid var(--line);
  border-radius:22px;
  background:rgba(255,255,255,.52);
}
.proof-value{
  display:block;
  font-size:1.9rem;
  font-weight:800;
  letter-spacing:-.05em;
}
.proof-label{
  display:block;
  margin-top:.35rem;
  font-size:.86rem;
  line-height:1.5;
  color:var(--muted);
}
.hero-stack{
  display:grid;
  gap:1.25rem;
}
.hero-panel{
  padding:1.6rem;
  position:relative;
  overflow:hidden;
}
.hero-panel::before{
  content:'';
  position:absolute;
  inset:auto 0 0 0;
  height:5px;
  background:linear-gradient(90deg,var(--accent),rgba(15,118,110,0));
}
.panel-label{
  font-size:.68rem;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--muted);
}
.panel-title{
  margin-top:.8rem;
  font-size:1.55rem;
  line-height:1.18;
  letter-spacing:-.04em;
}
.panel-text{
  margin-top:.85rem;
  font-size:.97rem;
  line-height:1.75;
  color:var(--ink-soft);
}
.meta-grid{
  margin-top:1.35rem;
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:1rem;
}
.meta-card{
  padding:1rem;
  border-radius:18px;
  background:var(--surface-tint);
  border:1px solid rgba(25,22,19,.07);
}
.meta-label{
  display:block;
  font-size:.64rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--muted);
}
.meta-value{
  display:block;
  margin-top:.45rem;
  font-size:.98rem;
  line-height:1.45;
  font-weight:700;
}
.signal-list{
  list-style:none;
  margin-top:1rem;
  display:grid;
  gap:.9rem;
}
.signal-list li{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:.75rem;
  align-items:start;
  font-size:.95rem;
  line-height:1.7;
  color:var(--ink-soft);
}
.signal-list li::before{
  content:'01';
  font-family:var(--mono);
  font-size:.66rem;
  letter-spacing:.12em;
  color:var(--accent-deep);
  padding-top:.35rem;
}
.signal-list li:nth-child(2)::before{content:'02'}
.signal-list li:nth-child(3)::before{content:'03'}

.section-head{
  display:grid;
  grid-template-columns:200px minmax(0,1fr);
  gap:1.5rem;
  align-items:start;
}
.section-label{
  display:inline-flex;
  align-items:center;
  gap:.75rem;
  padding-top:.35rem;
  font-size:.7rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--accent-deep);
}
.section-label::before{
  content:'';
  width:32px;
  height:2px;
  border-radius:999px;
  background:linear-gradient(90deg,var(--accent),rgba(15,118,110,.15));
}
.section-title{
  max-width:12ch;
  font-size:clamp(2rem,4vw,3.6rem);
  line-height:.98;
  letter-spacing:-.05em;
}
.section-sub{
  margin-top:.9rem;
  max-width:58ch;
  font-size:1rem;
  line-height:1.8;
  color:var(--ink-soft);
}
